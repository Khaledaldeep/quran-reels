<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Video Maker</title>
    <style>
        body {
            background-color: #0a0a0f;
            color: #e8e0d0;
            font-family: 'Amiri', sans-serif;
            text-align: center;
        }
        h1 {
            color: #c9a84c;
            text-shadow: 2px 2px 4px #000;
        }
        canvas {
            border: 2px solid #c9a84c;
        }
        .controls {
            margin: 20px;
        }
        .glow {
            text-shadow: 0 0 10px #c9a84c;
        }
    </style>
</head>
<body>
    <h1 class="glow">Quran Video Maker</h1>
    <div class="controls">
        <select id="reciter">
            <option value="3">Mishary</option>
            <option value="5">Abdulbasit</option>
            <option value="42">Saad</option>
            <option value="4">Maher</option>
            <option value="39">Islam</option>
            <option value="8">Yasser</option>
            <option value="24">Minshawi</option>
            <option value="25">Husary</option>
            <option value="35">AbuBakr</option>
            <option value="40">Ahmed</option>
            <option value="41">Muhammad</option>
            <option value="9">Sudais</option>
        </select>
        <input type="color" id="bgColor" value="#ffffff">
        <button id="generateVideo">Generate Video</button>
    </div>
    <canvas id="videoCanvas" width="720" height="1280"></canvas>
    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');

        function drawBackground() {
            ctx.fillStyle = document.getElementById('bgColor').value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        async function startRecording() {
            const stream = canvas.captureStream(30);
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            const chunks = [];

            mediaRecorder.ondataavailable = event => {
                if (event.data.size > 0) {
                    chunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'quran-video.webm';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            mediaRecorder.start();
            return mediaRecorder;
        }

        document.getElementById('generateVideo').onclick = async () => {
            drawBackground();
            const recorder = await startRecording();
            setTimeout(() => {
                recorder.stop();
            }, 30000); // Adjust duration here: 30000ms = 30s
        };
    </script>
</body>
</html>
